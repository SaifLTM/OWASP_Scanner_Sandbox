name: SAST Scan

on:
  push:
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      # Checkout THIS repo
      - name: Checkout repo
        uses: actions/checkout@v6

      # Install dependencies
      - name: Install tools
        run: |
          pip install semgrep

      # Run Semgrep scan against this repository
      - name: Run Semgrep
        run: |
          mkdir -p output
          semgrep scan \
            --config=p/owasp-top-ten \
            --json \
            . > output/results.json

      # Generate HTML dashboard
      - name: Generate HTML report
        run: |
          python3 scripts/generate_report.py

      # Upload report
      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: sast-dashboard
          path: output/security-report.html
