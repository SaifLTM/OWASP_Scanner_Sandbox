name: SAST Scan

on:
  push:
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout OWASP Insecure Application repo
        run: |
          git clone --depth=1 https://github.com/baigsf/OWASP_Insecure_Application

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p output
          semgrep scan \
            --config=p/owasp-top-ten \
            --json \
            ./OWASP_Insecure_Application > output/results.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended,security-and-quality
          source-root: ./OWASP_Insecure_Application
          build-mode: none

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: output/codeql-results

      - name: Show generated scan files
        run: |
          echo "Generated scan files:"
          find output -type f || true

      - name: Generate HTML report
        run: |
          python3 scripts/generate_report.py

      - name: Show final output files
        run: |
          echo "Final output files:"
          find output -type f || true

      - name: Upload HTML dashboard
        uses: actions/upload-artifact@v4
        with:
          name: sast-dashboard
          path: output/security-report.html
