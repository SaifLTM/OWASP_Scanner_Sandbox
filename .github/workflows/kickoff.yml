name: SAST (Semgrep + CodeQL)

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # 1. Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Clone WebGoat (target app)
      - name: Clone WebGoat
        run: |
          git clone --depth=1 https://github.com/WebGoat/WebGoat.git

      # -----------------------------
      # ✅ SEMGREP (HTML DASHBOARD)
      # -----------------------------

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep scan
        run: |
          mkdir -p output
          semgrep scan \
            --config=p/owasp-top-ten \
            --json \
            ./WebGoat > output/results.json

      - name: Generate HTML report
        run: |
          python3 scripts/generate_report.py

      # -----------------------------
      # ✅ CODEQL SCAN
      # -----------------------------

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          source-root: ./WebGoat

      - name: Build WebGoat
        run: |
          cd WebGoat
          mvn clean install -DskipTests

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # -----------------------------
      # ✅ UPLOAD HTML DASHBOARD
      # -----------------------------

      - name: Upload HTML dashboard
        uses: actions/upload-artifact@v4
        with:
          name: sast-dashboard
          path: output/security-report.html
