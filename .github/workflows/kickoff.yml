name: SAST (Semgrep + CodeQL + HTML)

on:
  push:
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # ✅ 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ 2. Install Semgrep
      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          pip install semgrep

      # ✅ 3. Run Semgrep scan
      - name: Run Semgrep
        run: |
          mkdir -p output
          semgrep scan \
            --config=p/owasp-top-ten \
            --json \
            . > output/results.json

      # ✅ 4. Initialize CodeQL (auto-detect languages)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3

      # ✅ 5. Run CodeQL + FORCE FILE OUTPUT (FIXED)
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: output/codeql-results.sarif   # ✅ FIX: Force file, not folder

      # ✅ 6. Generate HTML report (combined)
      - name: Generate dashboard
        run: |
          python3 scripts/generate_report.py

      # ✅ 7. Upload HTML
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: sast-dashboard
          path: output/security-report.html
